name: CI

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

env:
  DATABASE_URL: "sqlite:///./test.db"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple
          pip install pytest-cov

      - name: Run tests with coverage
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          # 1. 创建 .env 文件（备用）
          echo "API_KEY=${{ secrets.API_KEY }}" > .env
          
          # 2. 调试：打印 .env 内容（实际值会被 GitHub 自动隐藏为 ***）
          echo "=== .env file content ==="
          cat .env
          echo "========================="
          
          # 3. 调试：打印当前 shell 中的 API_KEY 环境变量
          echo "=== API_KEY in shell environment ==="
          echo "API_KEY = ${API_KEY:-NOT_SET}"
          echo "===================================="
          
          # 4. 调试：用 Python 直接读取环境变量和 .env 文件
          echo "=== Python: os.getenv('API_KEY') ==="
          python -c "import os; print(repr(os.getenv('API_KEY')))"
          echo "===================================="
          echo "=== Python: load_dotenv() then os.getenv ==="
          python -c "from dotenv import load_dotenv; import os; load_dotenv(); print(repr(os.getenv('API_KEY')))"
          echo "============================================="
          
          # 5. 调试：检查测试客户端初始化时是否能拿到 API_KEY（不运行测试，只导入）
          echo "=== Test client API_KEY value ==="
          python -c "
from dotenv import load_dotenv
import os
load_dotenv()
from fastapi.testclient import TestClient
from main import app
api_key = os.getenv('API_KEY')
print('API_KEY value in test client init:', repr(api_key))
if api_key:
    client = TestClient(app, headers={'X-API-Key': api_key})
    print('Client created with headers')
else:
    print('WARNING: API_KEY is None, client will not send auth header')
"
          echo "================================"
          
          # 6. 运行真正的测试
          pytest test_main.py -v --cov=main --cov=crud --cov=schemas --cov-report=term-missing