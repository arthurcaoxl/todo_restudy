name: CI

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

env:
  DATABASE_URL: "sqlite:///./test.db"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple
          pip install pytest-cov

      - name: Run tests with coverage
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "API_KEY=${{ secrets.API_KEY }}" > .env
          echo "=== .env content ==="
          cat .env
          echo "=== Shell API_KEY ==="
          echo "API_KEY = ${API_KEY:-NOT_SET}"
          echo "=== Python getenv ==="
          python -c "import os; print('os.getenv:', repr(os.getenv('API_KEY')))"
          python -c "from dotenv import load_dotenv; import os; load_dotenv(); print('load_dotenv then getenv:', repr(os.getenv('API_KEY')))"
          pytest test_main.py -v --cov=main --cov=crud --cov=schemas --cov-report=term-missing
